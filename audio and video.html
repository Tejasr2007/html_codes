<!DOCTYPE html>
<html>
<head>
<title>embedding audio and video files</title>
</head>
<body>
<h3>embedding audio and video</h3>
<h1><u>humming birds</u></h1>
<section>
<p>play the audio to know about humming birds:</p>
<!--audio--->
<audio controls>
<source src="hummingbirds.mp3"type="audio/mpeg">
yours browser does not support the audio elements.
</audio>
</section>
<br><br>
<section>
<p>watch the video of humming birds:</p>
<!--video--->
<video width="400"controls>
<source src="hummingbirds.mp4"type="video/mp4">
your browser does not support the video elements.
</video>
</section>
</body>
</html>
